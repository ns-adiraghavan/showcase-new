server {
    listen 80;
    server_name showcase.yourdomain.com;  # <-- replace with your actual subdomain

    root /var/www/netscribes-showcase/dist;
    index index.html;

    # SPA fallback â€” all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache thumbnails for a week
    location /thumbnails/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Don't cache index.html itself
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
